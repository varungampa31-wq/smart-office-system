<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary fixed-top">
    <div class="container-fluid">
        <span class="navbar-brand fs-3">🏢 Smart Office System</span>

        <div>
            <span class="text-white me-3">Attendance</span>

            <button class="btn btn-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="sidebar">

    <a href="dashboard.html">🏠 Dashboard</a>

    <a href="employees.html">👨 Employees</a>

    <a href="attendance.html" class="bg-primary">📅 Attendance</a>

    <a href="alerts.html">🚨 Alerts</a>

    <a href="scanner.html">📡 RFID Scanner</a>

</div>

<div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Attendance Records</h2>

        <input
            type="text"
            class="form-control"
            style="width:300px"
            id="searchBox"
            placeholder="Search Employee">

    </div>

    <div class="card">

        <div class="card-body">

            <table class="table table-hover table-striped">

                <thead class="table-dark">

                <tr>

                    <th>Employee ID</th>

                    <th>Name</th>

                    <th>Date</th>

                    <th>Check In</th>

                    <th>Check Out</th>

                    <th>Hours</th>

                    <th>Status</th>

                </tr>

                </thead>

                <tbody id="attendanceTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/attendance.js"></script>

</body>

</html>
