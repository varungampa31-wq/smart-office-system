<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary fixed-top">
    <div class="container-fluid">
        <span class="navbar-brand fs-3">Smart Office System</span>

        <div>
            <span class="text-white me-3">Employees</span>

            <button class="btn btn-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="sidebar">

    <a href="dashboard.html">Dashboard</a>

    <a href="employees.html" class="bg-primary">Employees</a>

    <a href="attendance.html">Attendance</a>

    <a href="alerts.html">Alerts</a>

    <a href="scanner.html"> RFID Scanner</a>

</div>

<div class="main-content">

    <div class="d-flex justify-content-between mb-3">

        <h2>Employee Management</h2>

        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
            + Add Employee
        </button>

    </div>

    <div class="card">

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Department</th>

                    <th>Status</th>
                    <th></th>

                </tr>

                </thead>

                <tbody id="employeeTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<div class="modal fade" id="addEmployeeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add employee</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="addEmployeeForm">
                <div class="modal-body">

                    <div id="addEmployeeError" class="alert alert-danger d-none"></div>

                    <div class="mb-3">
                        <label class="form-label">Employee ID</label>
                        <input type="text" class="form-control" id="employeeId" placeholder="EMP006" required>
                    </div>

                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">First name</label>
                            <input type="text" class="form-control" id="firstName" required>
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control" id="lastName" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <select class="form-select" id="department" required>
                            <option value="IT">Information Technology</option>
                            <option value="HR">Human Resources</option>
                            <option value="Finance">Finance</option>
                            <option value="Admin">Administration</option>
                            <option value="Security">Security</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">RFID tag</label>
                        <input type="text" class="form-control" id="rfidTag" placeholder="RFID-A1006" required>
                        <div class="form-text">Must be unique. Used by the scanner and sensor simulators.</div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Add employee</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/employees.js"></script>

</body>

</html>
