<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary fixed-top">
    <div class="container-fluid">
        <span class="navbar-brand fs-3">🏢 Smart Office System</span>

        <div>
            <span class="text-white me-3">Alerts</span>

            <button class="btn btn-light" onclick="logout()">
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="sidebar">

    <a href="dashboard.html">🏠 Dashboard</a>

    <a href="employees.html">👨 Employees</a>

    <a href="attendance.html">📅 Attendance</a>

    <a href="alerts.html" class="bg-primary">🚨 Alerts</a>

    <a href="scanner.html">📡 RFID Scanner</a>

</div>

<div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Alerts</h2>

        <div>
            <select id="severityFilter" class="form-select form-select-sm d-inline-block w-auto me-2">
                <option value="">All Severities</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>

            <select id="resolvedFilter" class="form-select form-select-sm d-inline-block w-auto">
                <option value="">All</option>
                <option value="false">Unresolved</option>
                <option value="true">Resolved</option>
            </select>
        </div>

    </div>

    <div class="card">

        <div class="card-body">

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>Time</th>

                    <th>Employee</th>

                    <th>Type</th>

                    <th>Severity</th>

                    <th>Description</th>

                    <th>Status</th>

                    <th></th>

                </tr>

                </thead>

                <tbody id="alertsTable">
                </tbody>

            </table>

            <p id="emptyMessage" class="text-muted text-center d-none">
                No alerts match the selected filters.
            </p>

        </div>

    </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/alerts.js"></script>

</body>

</html>
